- name: Installing Apache 
  hosts: all
  become: yes
  tasks:
    - name: Install Apache - Debian
      apt:
        update_cache: yes
        name: apache2
        state: present
      when: ansible_distribution == 'Debian'

    - name: Install Apache - RHEL
      yum:
        name: httpd
        state: present
      when: ansible_os_family == 'RedHat'
     
    - name: Ensure Apache is running - Debian
      service:
        name: apache2
        state: started
        enabled: yes
      when: ansible_distribution == 'Debian'

    - name: Ensure Apache is running - RHEL
      service:
        name: httpd
        state: started
        enabled: yes
      when: ansible_os_family == 'RedHat'