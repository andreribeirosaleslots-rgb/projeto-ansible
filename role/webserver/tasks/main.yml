---
- name: Install Apache
  package:
    name: httpd
    state: present

- name: Start and enable Apache
  service:
    name: httpd
    state: started
    enabled: true

- name: Copy image
  copy:
    src: devops.png
    dest: /var/www/html/devops.png
    owner: root
    group: root
    mode: '0644'

- name: Generate HTML page
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
  notify:
    - Restarting Apache